<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Island Commando Boss Hunt</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #05070d;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #151d2f 0%, #05070d 70%);
    }

    canvas {
      width: min(100vw, calc(100vh * 1.6666667));
      height: min(100vh, calc(100vw * 0.6));
      background: black;
      display: block;
      outline: none;
      box-shadow: 0 18px 80px rgba(0,0,0,.85);
      border: 1px solid rgba(255,255,255,.08);
    }

    #hint {
      position: fixed;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      opacity: .75;
      user-select: none;
    }
  </style>
</head>

<body>
<div id="wrap">
  <canvas id="game" width="1500" height="900" tabindex="0"></canvas>
</div>

<div id="hint">
  Click the game first. Controls: A/D move, W jump, S duck, Space attack, 1-6 weapons, Up shield, 9 bandage, P pause, L unlock all weapons.
</div>

function rgb(c, a = 1) {
  return `rgba(${c[0]},${c[1]},${c[2]},${a})`;
}

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function randint(min, max) {
  return Math.floor(rand(min, max + 1));
}

function choice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function now() {
  return performance.now();
}

function rect(x, y, w, h) {
  return { x, y, w, h };
}

function collide(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function pointInRect(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function drawRect(color, x, y, w, h, a = 1) {
  ctx.fillStyle = rgb(color, a);
  ctx.fillRect(x, y, w, h);
}

function drawCircle(color, x, y, r, a = 1) {
  ctx.fillStyle = rgb(color, a);
  ctx.beginPath();
  ctx.arc(x, y, Math.max(0, r), 0, Math.PI * 2);
  ctx.fill();
}

function drawEllipse(color, x, y, w, h, a = 1) {
  ctx.fillStyle = rgb(color, a);
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h / 2, Math.abs(w / 2), Math.abs(h / 2), 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawLine(color, x1, y1, x2, y2, width = 1, a = 1) {
  ctx.strokeStyle = rgb(color, a);
  ctx.lineWidth = width;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function roundedPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawRounded(color, x, y, w, h, r = 12, a = 1) {
  ctx.fillStyle = rgb(color, a);
  roundedPath(x, y, w, h, r);
  ctx.fill();
}

function drawRoundedStroke(color, x, y, w, h, r = 12, line = 2, a = 1) {
  ctx.strokeStyle = rgb(color, a);
  ctx.lineWidth = line;
  roundedPath(x, y, w, h, r);
  ctx.stroke();
}

function text(msg, x, y, size = 24, color = C.WHITE, align = "left", weight = "normal") {
  ctx.font = `${weight} ${size}px Arial`;
  ctx.fillStyle = rgb(color);
  ctx.textAlign = align;
  ctx.textBaseline = "top";
  ctx.fillText(msg, x, y);
}

function wrapText(message, size, maxWidth) {
  ctx.font = `${size}px Arial`;
  const words = String(message).split(/\s+/);
  const lines = [];
  let current = "";

  for (const word of words) {
    const trial = current ? current + " " + word : word;
    if (ctx.measureText(trial).width <= maxWidth) {
      current = trial;
    } else {
      if (current) lines.push(current);
      current = word;
    }
  }

  if (current) lines.push(current);
  return lines;
}

let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function playTone(freq, dur = 0.08, vol = 0.05, type = "square", noise = false) {
  if (!audioCtx) return;

  const t0 = audioCtx.currentTime;

  if (noise) {
    const len = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    }

    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();

    src.buffer = buffer;
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    src.connect(gain).connect(audioCtx.destination);
    src.start(t0);
    src.stop(t0 + dur);
    return;
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}

function playSound(name) {
  const sounds = {
    mg: [210, 0.055, 0.045, "square", false],
    shotgun: [110, 0.16, 0.1, "square", true],
    pistol: [260, 0.08, 0.06, "square", false],
    bazooka: [86, 0.22, 0.14, "sawtooth", true],
    explosion: [52, 0.38, 0.2, "square", true],
    punch: [96, 0.08, 0.06, "sine", false],
    machete: [720, 0.1, 0.04, "sawtooth", false],
    hurt: [180, 0.17, 0.06, "sawtooth", false],
    shield: [290, 0.14, 0.05, "triangle", false],
    enemy_pistol: [240, 0.06, 0.035, "square", false],
    enemy_machine: [180, 0.045, 0.03, "square", false],
    jump: [350, 0.09, 0.04, "triangle", false],
    confirm: [520, 0.12, 0.045, "triangle", false],
    heal: [430, 0.14, 0.05, "triangle", false]
  };

  const p = sounds[name] || [220, 0.08, 0.05, "sine", false];
  playTone(...p);
}

const keys = new Set();
let mouseDown = false;
let mouseX = 0;
let mouseY = 0;

canvas.addEventListener("mousedown", e => {
  initAudio();
  canvas.focus();
  mouseDown = true;
  const pos = getMouse(e);
  mouseX = pos.x;
  mouseY = pos.y;
  handleClick(mouseX, mouseY);
});

canvas.addEventListener("mouseup", () => {
  mouseDown = false;
});

canvas.addEventListener("mousemove", e => {
  const pos = getMouse(e);
  mouseX = pos.x;
  mouseY = pos.y;
});

window.addEventListener("keydown", e => {
  initAudio();
  keys.add(e.code);

  if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
    e.preventDefault();
  }

  if (e.code === "KeyP" && gameState === "playing") {
    gameState = "paused";
  } else if (e.code === "KeyP" && gameState === "paused") {
    gameState = "playing";
  }

  if (gameState === "menu") {
    if (e.code === "Digit1") selectedStartLevel = 1;
    if (e.code === "Digit2") selectedStartLevel = 2;
    if (e.code === "Digit3") selectedStartLevel = 3;
    if (e.code === "Digit4") selectedStartLevel = 4;
    if (e.code === "Digit5") selectedStartLevel = 5;
    if (e.code === "Enter") startGame(selectedStartLevel);
  }

  if (e.code === "KeyL") {
    unlockedWeapons = new Set([1, 2, 3, 4, 5, 6]);
    allWeaponsUnlocked = true;
    showStatus("All weapons unlocked!");
    playSound("confirm");
  }

  if (gameState === "playing") {
    if (e.code === "Digit1" && unlockedWeapons.has(1)) currentWeapon = 1;
    if (e.code === "Digit2" && unlockedWeapons.has(2)) currentWeapon = 2;
    if (e.code === "Digit3" && unlockedWeapons.has(3)) currentWeapon = 3;
    if (e.code === "Digit4" && unlockedWeapons.has(4)) currentWeapon = 4;
    if (e.code === "Digit5" && unlockedWeapons.has(5)) currentWeapon = 5;
    if (e.code === "Digit6" && unlockedWeapons.has(6)) currentWeapon = 6;

    if (e.code === "Digit9") useBandage();
  }
});

window.addEventListener("keyup", e => {
  keys.delete(e.code);
});

function getMouse(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (WIDTH / r.width),
    y: (e.clientY - r.top) * (HEIGHT / r.height)
  };
}

function getBandagesForLevel(level) {
  return 3 * Math.pow(2, Math.max(0, level - 1));
}

function getDrawY() {
  return isDucking ? playerY + 28 : playerY;
}

function getPlayerWorldX() {
  return bossMode ? playerX : worldOffset + playerX;
}

function worldToScreenX(worldX) {
  return bossMode ? worldX : worldX - worldOffset;
}

function getPlayerRect() {
  const drawY = getDrawY();
  if (isDucking) {
    return rect(playerX + 28, drawY + 22, 58, 105);
  }
  return rect(playerX + 28, drawY + 12, 58, 140);
}

function getPlayerCenter() {
  const r = getPlayerRect();
  return [r.x + r.w / 2, r.y + r.h / 2];
}

function getMuzzlePos(drawY, ducking, facing) {
  if (ducking) {
    return facing === 1 ? [playerX + 135, drawY + 112] : [playerX + 5, drawY + 112];
  }
  return facing === 1 ? [playerX + 135, drawY + 95] : [playerX + 5, drawY + 95];
}

function getPlayerShotSpread(baseSpread, weaponKind) {
  let spread = baseSpread;

  if (!onGround) {
    spread *= 1.8;
  } else if (isDucking) {
    spread *= 0.72;
  } else if (Math.abs(walkTimer) > 0.12) {
    spread *= 1.3;
  }

  if (weaponKind === "mg") {
    spread += Math.min(0.22, weaponRecoil * 0.014);
  } else if (weaponKind === "shotgun") {
    spread *= 1.15;
  }

  return rand(-spread, spread);
}

  drawEllipse(C.STORM_CLOUD, x + 55 * scale, y - 5 * scale, 90 * scale, 38 * scale);
}

  drawLine(C.PALM_TRUNK, x + 8, groundYPos - 65, x - 3, groundYPos - 18, 4);

  const topX = x + 8;
  const topY = groundYPos - 125;

  drawEllipse(C.PALM_LEAF, topX - 60, topY - 5, 70, 18);
  drawEllipse(C.PALM_LEAF, topX - 10, topY - 14, 72, 18);
  drawEllipse(C.PALM_LEAF, topX - 56, topY - 28, 68, 18);
  drawEllipse(C.PALM_LEAF, topX - 8, topY - 35, 68, 18);
  drawEllipse(C.PALM_LEAF, topX - 28, topY + 5, 70, 18);
}

function drawRock(x, groundYPos) {

  drawCircle(C.FIRE1, x, y - 8 * scale, 8 * scale);
  drawCircle(C.FIRE1, x + 14 * scale, y - 3 * scale, 5 * scale);
}

  for (let y = 645; y < HEIGHT; y += 42) {

  for (let i = -2; i < 8; i++) {

    drawPalmTree(x + 70, 640);
    drawBush(x + 20, 640);
    drawRock(x + 170, 642);
  }
}

function spawnEnemyBullet(kind, x, y, tx, ty, damage = 1) {
  const dx = tx - x;
  const dy = ty - y;
  const len = Math.max(1, Math.hypot(dx, dy));
  let speed = 7;
  let spread = 0;
  let life = 130;

  if (kind === "machine") {
    speed = 8;
    spread = rand(-0.08, 0.08);
    playSound("enemy_machine");
  } else if (kind === "heavy_machine") {
    speed = 10;
    spread = rand(-0.13, 0.13);
    life = 145;
    playSound("enemy_machine");
  } else if (kind === "flame") {
    speed = 5;
    spread = rand(-0.22, 0.22);
    life = 34;
  } else {
    playSound("enemy_pistol");
  }

  const angle = Math.atan2(dy, dx) + spread;

  enemyBullets.push({
    kind,
    x,
    y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life,
    damage
  });
}

  if (currentLevel === 2) return randint(3, 4);
  if (currentLevel === 5) return randint(5, 8);

  if (enemiesDefeated < 10) return 4;

  if (currentLevel === 5) {
    return choice(["machine", "machine", "heavy_machine", "machete", "flame"]);

function spawnEnemyGroup() {
  const playerWorldX = getPlayerWorldX();

  if (currentLevel === 2) {
    const remaining = levelTwoSpawnTarget - levelTwoSpawned;
    if (remaining <= 0) return;

    const count = Math.min(remaining, randint(3, 4));
    const baseX = playerWorldX + randint(420, 760);

    for (let i = 0; i < count; i++) {
      enemies.push(makeLevelTwoEnemy(baseX + i * 76));
      enemiesSpawnedTotal++;
      levelTwoSpawned++;
    }
    return;
  }

  if (currentLevel === 3) {
    const remaining = levelThreeSpawnTarget - levelThreeSpawned;
    if (remaining <= 0) return;

    const count = Math.min(remaining, randint(2, 4));
    const baseX = playerWorldX + randint(420, 780);

    for (let i = 0; i < count; i++) {
      enemies.push(makeLevelThreeEnemy(baseX + i * 76));
      enemiesSpawnedTotal++;
      levelThreeSpawned++;
    }
    return;
  }

  if (currentLevel === 5) {
    const remaining = levelFiveSpawnTarget - levelFiveSpawned;
    if (remaining <= 0) return;

    const count = Math.min(remaining, randint(2, 3));
    const baseX = playerWorldX + randint(420, 740);

    for (let i = 0; i < count; i++) {
      enemies.push(makeLevelFiveEnemy(baseX + i * 82));
      enemiesSpawnedTotal++;
      levelFiveSpawned++;
    }
    return;
  }

  const count = randint(1, 3);
  const baseX = playerWorldX + randint(520, 840);

  for (let i = 0; i < count; i++) {
    enemies.push(makeEnemy(baseX + i * 70));
    enemiesSpawnedTotal++;
  }
}

function getEnemyRect(e) {
  const sx = worldToScreenX(e.worldX);
  return rect(sx - e.w / 2, e.y - e.h, e.w, e.h);
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  e.talkUntil = now() + 700;
  e.talkText = "I'm hit!";

  if (e.hp <= 0) {
    const index = enemies.indexOf(e);
    if (index >= 0) enemies.splice(index, 1);

    enemiesDefeated++;

    if (currentLevel === 2) levelTwoKills++;
    if (currentLevel === 3) levelThreeKills++;
    if (currentLevel === 5) levelFiveKills++;

    spawnSmoke(worldToScreenX(e.worldX), e.y - e.h / 2, 8, 16, true);
    spawnShockwave(worldToScreenX(e.worldX), e.y - 60, 8);

    if (currentLevel === 1 && enemiesDefeated >= 16) {
      advanceLevel();
    }

    if (currentLevel === 2 && levelTwoKills >= levelTwoSpawnTarget && enemies.length === 0) {
      advanceLevel();
    }

    if (currentLevel === 3 && levelThreeKills >= levelThreeSpawnTarget && enemies.length === 0) {
      advanceLevel();
    }

    if (currentLevel === 5 && levelFiveKills >= levelFiveSpawnTarget && enemies.length === 0) {
      startBossMode();
    }
  }
}

  enemyBullets = [];
  projectiles = [];
  explosions = [];
  smokeParticles = [];
  shells = [];
  slashEffects = [];
  sparks = [];
  scorchMarks = [];

  worldOffset = 0;
  playerX = 70;
  playerY = groundY;
  verticalVelocity = 0;
  playerHealth = playerMaxHealth;
  bandages = getBandagesForLevel(currentLevel);
  bossMode = false;
  boss = null;

  if (currentLevel === 2) {
    levelTwoSpawned = 0;

function goHome() {
  gameState = "menu";
  gameOver = false;
  victory = false;
  bossMode = false;
}

function handleClick(x, y) {
  if (gameState === "menu") {
    for (let i = 0; i < levelSelectButtonRects.length; i++) {
      if (pointInRect(x, y, levelSelectButtonRects[i])) {
        selectedStartLevel = i + 1;
        playSound("confirm");
      }
    }

    if (pointInRect(x, y, startButtonRect)) {
      startGame(selectedStartLevel);
    }

    if (pointInRect(x, y, quitButtonRect)) {
      showStatus("Close the browser tab to quit.");
    }

    return;
  }

  if (gameState === "paused") {
    if (pointInRect(x, y, resumeButtonRect)) gameState = "playing";
    if (pointInRect(x, y, homeButtonRect)) goHome();
    return;
  }

  if (gameOver || gameState === "game_over") {
    if (pointInRect(x, y, resetButtonRect)) startGame(currentLevel);
    if (pointInRect(x, y, homeButtonRect)) goHome();
    return;
  }

  if (victory || gameState === "victory") {
    if (pointInRect(x, y, playAgainButtonRect)) startGame(1);
    if (pointInRect(x, y, homeButtonRect)) goHome();
  }
}

function useBandage() {
  if (bandages <= 0) {
    showStatus("No bandages left!");
    return;
  }

  if (playerHealth >= playerMaxHealth) {
    showStatus("Health already full.");
    return;
  }

  bandages--;
  playerHealth = Math.min(playerMaxHealth, playerHealth + 2);
  playSound("heal");
  showStatus("Bandage used.");
}

function hitPlayer(dmg) {
  if (now() <= playerIframeUntil) return;

  playSound("hurt");
  playerHealth -= dmg;
  playerHealth = Math.max(0, playerHealth);
  playerSlowUntil = now() + 2200;
  playerIframeUntil = now() + 900;
  cameraShake = Math.max(cameraShake, 2.6);

  showStatus("You got hit! Movement slowed.", 1400);

  if (playerHealth <= 0) {
    gameOver = true;
    gameState = "game_over";
  }
}

function updatePlayer() {
  let dx = 0;

  if (keys.has("KeyA") || keys.has("ArrowLeft")) dx -= 1;
  if (keys.has("KeyD") || keys.has("ArrowRight")) dx += 1;

  isDucking = keys.has("KeyS") || keys.has("ArrowDown");

  let speed = isDucking ? baseDuckSpeed : basePlayerSpeed;
  if (now() < playerSlowUntil) speed *= slowMultiplier;

  if (dx !== 0) {
    playerFacing = dx > 0 ? 1 : -1;
    walkTimer += 0.25;

    if (bossMode) {
      playerX += dx * speed;
      playerX = clamp(playerX, 45, WIDTH - 180);
    } else {
      if (dx > 0 && playerX > rightScrollPoint) {
        worldOffset += dx * speed;
      } else if (dx < 0 && playerX < leftScrollPoint && worldOffset > 0) {
        worldOffset = Math.max(0, worldOffset + dx * speed);
      } else {
        playerX += dx * speed;
      }

      playerX = clamp(playerX, 35, WIDTH - 170);
    }
  } else {
    walkTimer *= 0.8;
  }

  if ((keys.has("KeyW") || keys.has("ArrowUp")) && onGround && !isDucking) {
    verticalVelocity = jumpPower;
    onGround = false;
    playSound("jump");
  }

  verticalVelocity += gravity;
  playerY += verticalVelocity;

  if (playerY >= groundY) {
    playerY = groundY;
    verticalVelocity = 0;
    onGround = true;
  }

  updateShield();
}

function updateShield() {
  const t = now();

  if (keys.has("ArrowUp") && t >= shieldCooldownUntil && shieldTimeLeft > 0) {
    if (!shieldActive) {
      shieldActive = true;
      shieldLastTick = t;
    }
  } else {
    if (shieldActive) {
      shieldActive = false;
      shieldCooldownUntil = t + shieldCooldownMs;
    }
  }

  if (shieldActive) {
    const elapsed = t - shieldLastTick;
    shieldTimeLeft -= elapsed;
    shieldLastTick = t;

    if (shieldTimeLeft <= 0) {
      shieldTimeLeft = 0;
      shieldActive = false;
      shieldCooldownUntil = t + shieldCooldownMs;
    }
  } else {
    shieldLastTick = t;
    if (t >= shieldCooldownUntil && shieldTimeLeft < shieldTimeMax) {
      shieldTimeLeft = Math.min(shieldTimeMax, shieldTimeLeft + 80);
    }
  }
}

let previousAttack = false;

function updateWeapons() {
  const t = now();
  const attack = keys.has("Space") || mouseDown;
  const justPressed = attack && !previousAttack;

  if (mgReloading && t - mgReloadStart >= mgReloadTime) {
    mgReloading = false;
    mgAmmo = mgMagSize;
    showStatus("Reloaded.");
  }

  const drawY = getDrawY();
  const [muzzleX, muzzleY] = getMuzzlePos(drawY, isDucking, playerFacing);

  if (currentWeapon === 1 && attack && t - punchLastTime >= punchInterval) {
    punchLastTime = t;
    punchAnimEnd = t + 110;
    playSound("punch");
    spawnSlash(playerX + 120 * playerFacing, drawY + 32, "punch");
    cameraShake = Math.max(cameraShake, 1.3);
  }

  if (currentWeapon === 2 && attack && !mgReloading && t - mgLastShot >= mgFireDelay) {
    spawnBullet("mg", muzzleX, muzzleY + rand(-1.4, 1.4), (20 + rand(-0.8, 0.8)) * playerFacing, getPlayerShotSpread(0.75, "mg"), 110, 1);
    mgLastShot = t;
    mgAmmo--;
    playSound("mg");
    muzzleFlashEnd = t + 60;
    weaponRecoil = Math.min(12, weaponRecoil + 2.6);
    cameraShake = Math.max(cameraShake, 1.6);
    spawnSmoke(muzzleX + 12 * playerFacing, muzzleY, 2, 6, false);
    spawnShell(playerX + (playerFacing > 0 ? 106 : 36), drawY + 94, 4);

    if (mgAmmo <= 0) {
      mgReloading = true;
      mgReloadStart = t;
      showStatus("Machine gun reloading...", 1300);
    }
  }

  if (currentWeapon === 3 && justPressed && t - shotgunLastShot >= shotgunCooldown) {
    for (let i = 0; i < 8; i++) {
      spawnBullet("shotgun", muzzleX, muzzleY + rand(-2, 2), rand(11.5, 14.2) * playerFacing, getPlayerShotSpread(2.3, "shotgun"), 48, 1);
    }

    shotgunLastShot = t;
    playSound("shotgun");
    muzzleFlashEnd = t + 110;
    weaponRecoil = 16;
    cameraShake = Math.max(cameraShake, 3);
    spawnSmoke(muzzleX + 10 * playerFacing, muzzleY, 7, 12, false);
    spawnShell(playerX + (playerFacing > 0 ? 108 : 34), drawY + 96, 5);
  }

  if (currentWeapon === 4 && justPressed && t - pistolLastShot >= pistolCooldown) {
    spawnBullet("pistol", muzzleX, muzzleY + rand(-0.6, 0.6), (21 + rand(-0.3, 0.3)) * playerFacing, getPlayerShotSpread(0.24, "pistol"), 120, 1);
    pistolLastShot = t;
    playSound("pistol");
    muzzleFlashEnd = t + 85;
    weaponRecoil = 7;
    cameraShake = Math.max(cameraShake, 1.8);
    spawnSmoke(muzzleX + 10 * playerFacing, muzzleY, 3, 7, false);
    spawnShell(playerX + (playerFacing > 0 ? 108 : 34), drawY + 98, 4);
  }

  if (currentWeapon === 5 && attack && t - macheteLastTime >= macheteInterval) {
    macheteLastTime = t;
    macheteAnimEnd = t + 150;
    playSound("machete");
    spawnSlash(playerX + 128 * playerFacing, drawY + 26, "machete");
    cameraShake = Math.max(cameraShake, 1.5);
  }

  if (currentWeapon === 6 && justPressed) {
    if (t >= grenadeReadyTime) {
      playSound("bazooka");
      projectiles.push({
        kind: "rocket",
        x: muzzleX,
        y: muzzleY,
        vx: 14 * playerFacing,
        vy: -1,
        life: 110,
        damage: 14
      });

      grenadeReadyTime = t + grenadeCooldown;
      muzzleFlashEnd = t + 150;
      weaponRecoil = 16;
      cameraShake = Math.max(cameraShake, 5);
      spawnSmoke(muzzleX + 12 * playerFacing, muzzleY, 16, 20, false);
      spawnShockwave(muzzleX, muzzleY, 18);
    } else {
      showStatus("Bazooka reloading: " + Math.ceil((grenadeReadyTime - t) / 1000) + "s");
    }
  }

  previousAttack = attack;
}

function updateEnemySpawn() {
  if (bossMode || currentLevel === 4) return;

  const t = now();

  if (t >= nextEnemySpawnTime) {
    spawnEnemyGroup();
    nextEnemySpawnTime = t + randint(2200, 4100);
  }
}

function updateEnemies() {
  const playerWorldX = getPlayerWorldX();
  const [pcx, pcy] = getPlayerCenter();

  for (const e of enemies.slice()) {
    const dx = playerWorldX - e.worldX;
    e.facing = dx >= 0 ? 1 : -1;
    e.stride += 0.12;

    if (Math.abs(dx) > 180) {
      e.worldX += Math.sign(dx) * e.speed;
    }

    if (!e.hasSpoken && Math.abs(dx) < 520) {
      e.hasSpoken = true;
      e.talkUntil = now() + 1200;
    }

    const sx = worldToScreenX(e.worldX);
    const weapon = e.weapon;

    if (now() - e.lastAttack >= e.fireDelay && Math.abs(dx) < 850) {
      e.lastAttack = now();
      e.muzzleFlashUntil = now() + 80;

      if (weapon === "pistol") {
        spawnEnemyBullet("pistol", sx, e.y - 76, pcx, pcy, 1);
      } else if (weapon === "machine") {
        spawnEnemyBullet("machine", sx, e.y - 80, pcx, pcy, 1);
      } else if (weapon === "heavy_machine") {
        spawnEnemyBullet("heavy_machine", sx, e.y - 84, pcx, pcy, 1);
      } else if (weapon === "flame") {
        spawnEnemyBullet("flame", sx, e.y - 74, pcx, pcy, 1);
      } else if (weapon === "machete" && Math.abs(dx) < 95) {
        hitPlayer(1);
        spawnSlash(playerX, getDrawY() + 30, "machete");
      }
    }
  }
}

function updateBoss() {
  if (!bossMode || !boss) return;

  const [pcx, pcy] = getPlayerCenter();

  boss.walk += 0.08;
  boss.facing = playerX < boss.x ? -1 : 1;

  if (Math.abs(playerX - boss.x) > 300) {
    boss.x += Math.sign(playerX - boss.x) * 1.2;
  }

  if (now() - boss.lastAttack > boss.attackDelay) {
    boss.lastAttack = now();

    if (Math.random() < 0.55) {
      spawnEnemyBullet("heavy_machine", boss.x, boss.y - 125, pcx, pcy, 1);
      spawnEnemyBullet("heavy_machine", boss.x, boss.y - 95, pcx, pcy, 1);
    } else {
      const bx = boss.x - 40;
      enemyBullets.push({
        kind: "fireball",
        x: bx,
        y: boss.y - 150,
        vx: -7,
        vy: -5,
        life: 140,
        damage: 2,
        blastRadius: 95
      });
      playSound("bazooka");
    }
  }
}

function updateLevelFourBoss() {
  if (currentLevel !== 4 || !levelFourBoss) return;

  const b = levelFourBoss;
  const [pcx, pcy] = getPlayerCenter();

  b.walk += 0.08;
  b.facing = playerX < b.x ? -1 : 1;

  if (Math.abs(playerX - b.x) > 240) {
    b.x += Math.sign(playerX - b.x) * 1.65;
  }

  if (now() - b.lastAttack > b.attackDelay) {
    b.lastAttack = now();

    if (Math.abs(playerX - b.x) < 170) {
      hitPlayer(2);
      spawnShockwave(playerX, getDrawY() + 90, 20);
    } else {
      spawnEnemyBullet("heavy_machine", b.x - 75, b.y - 125, pcx, pcy, 1);
      spawnEnemyBullet("heavy_machine", b.x - 75, b.y - 95, pcx, pcy, 1);
    }
  }
}

function updateProjectiles() {
  for (const p of projectiles.slice()) {
    p.x += p.vx;
    p.y += p.vy;

    if (p.kind === "rocket") {
      if (Math.random() < 0.55) {
        spawnSmoke(p.x - p.vx * 0.55, p.y, 1, 4, true);
      }

      const floorY = bossMode ? 725 : 760;
      if (p.y >= floorY) {
        spawnBazookaImpact(p.x, floorY);
        projectiles.splice(projectiles.indexOf(p), 1);
        continue;
      }
    }

    p.life--;

    if (p.life <= 0 || p.x > WIDTH + 100 || p.x < -120 || p.y < -50 || p.y > HEIGHT + 80) {
      projectiles.splice(projectiles.indexOf(p), 1);
    }
  }
}

function updateEnemyBullets() {
  const playerRect = getPlayerRect();
  const [pcx, pcy] = getPlayerCenter();

  for (const b of enemyBullets.slice()) {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    if (b.kind === "fireball") {
      b.vy += 0.1;
    }

    if (shieldActive) {
      const sx = playerX + (playerFacing > 0 ? 122 : 18);
      const sy = getDrawY() + (isDucking ? 112 : 96);
      const shieldBox = rect(sx - 38, sy - 48, 76, 96);

      if (pointInRect(b.x, b.y, shieldBox)) {
        playSound("shield");
        spawnSmoke(b.x, b.y, 3, 5, false);

        if (b.kind === "heavy_machine") {
          playerX += b.vx * 1.2;
          cameraShake = Math.max(cameraShake, 2.2);
        }

        enemyBullets.splice(enemyBullets.indexOf(b), 1);
        continue;
      }
    }

    const br = rect(b.x - 6, b.y - 6, 12, 12);

    if (collide(br, playerRect)) {
      if (b.kind === "fireball") {
        spawnExplosion(b.x, b.y);
        if (Math.hypot(b.x - pcx, b.y - pcy) <= (b.blastRadius || 92)) {
          hitPlayer(b.damage);
        }
      } else {
        hitPlayer(b.damage);
      }

      enemyBullets.splice(enemyBullets.indexOf(b), 1);
      continue;
    }

    const floorY = bossMode ? 740 : 760;

    if (b.kind === "fireball" && b.y >= floorY) {
      spawnExplosion(b.x, floorY);
      if (Math.hypot(b.x - pcx, floorY - pcy) <= (b.blastRadius || 92)) {
        hitPlayer(b.damage);
      }

      enemyBullets.splice(enemyBullets.indexOf(b), 1);
      continue;
    }

    if (b.life <= 0 || b.x < -80 || b.x > WIDTH + 80 || b.y < -50 || b.y > HEIGHT + 50) {
      enemyBullets.splice(enemyBullets.indexOf(b), 1);
    }
  }
}

function updateEffects() {
  for (const e of explosions.slice()) {
    e.life--;
    if (e.life <= 0) explosions.splice(explosions.indexOf(e), 1);
  }

  for (const s of smokeParticles.slice()) {
    s.x += s.vx;
    s.y += s.vy;
    s.r += 0.18;
    s.life--;
    if (s.life <= 0) smokeParticles.splice(smokeParticles.indexOf(s), 1);
  }

  for (const sh of shells.slice()) {
    sh.x += sh.vx;
    sh.y += sh.vy;
    sh.vy += 0.22;
    sh.rot += sh.vr;
    sh.life--;

    const floor = bossMode ? 740 : 760;
    if (sh.y > floor) {
      sh.y = floor;
      sh.vx *= 0.7;
      sh.vy *= -0.25;
      sh.vr *= 0.7;
    }

    if (sh.life <= 0) shells.splice(shells.indexOf(sh), 1);
  }

  for (const sp of sparks.slice()) {
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.vy += 0.26;
    sp.vx *= 0.98;
    sp.life--;

    if (sp.life <= 0) sparks.splice(sparks.indexOf(sp), 1);
  }

  for (const sw of shockwaves.slice()) {
    sw.r += 4;
    sw.life--;

    if (sw.life <= 0) shockwaves.splice(shockwaves.indexOf(sw), 1);
  }

  for (const sl of slashEffects.slice()) {
    sl.life--;
    if (sl.life <= 0) slashEffects.splice(slashEffects.indexOf(sl), 1);
  }

  for (const m of scorchMarks.slice()) {
    m.life--;
    if (m.life <= 0) scorchMarks.splice(scorchMarks.indexOf(m), 1);
  }

  weaponRecoil *= 0.78;
  cameraShake *= 0.82;

  if (weaponRecoil < 0.05) weaponRecoil = 0;
  if (cameraShake < 0.05) cameraShake = 0;
}

function checkPlayerAttacksHit() {
  const attack = keys.has("Space") || mouseDown;

  if (attack && (currentWeapon === 1 || currentWeapon === 5)) {
    const meleeRange = currentWeapon === 1 ? 95 : 125;
    const meleeDamage = currentWeapon === 1 ? 1 : 2;
    const pr = getPlayerRect();

    const hitBox = playerFacing > 0
      ? rect(pr.x + pr.w, pr.y + 30, meleeRange, 70)
      : rect(pr.x - meleeRange, pr.y + 30, meleeRange, 70);

    for (const e of enemies.slice()) {
      if (collide(hitBox, getEnemyRect(e))) {
        damageEnemy(e, meleeDamage);
      }
    }

    if (boss && collide(hitBox, rect(boss.x - boss.w / 2, boss.y - boss.h, boss.w, boss.h))) {
      boss.hp -= meleeDamage;
    }

    if (levelFourBoss && collide(hitBox, rect(levelFourBoss.x - levelFourBoss.w / 2, levelFourBoss.y - levelFourBoss.h, levelFourBoss.w, levelFourBoss.h))) {
      levelFourBoss.hp -= meleeDamage;
      if (levelFourBoss.hp <= 0) {
        levelFourBoss = null;
        advanceLevel();
      }
    }
  }

  for (const p of projectiles.slice()) {
    const pr = rect(p.x - 5, p.y - 5, 10, 10);

    for (const e of enemies.slice()) {
      if (collide(pr, getEnemyRect(e))) {
        damageEnemy(e, p.damage);
        spawnSparksAt(p.x, p.y);
        projectiles.splice(projectiles.indexOf(p), 1);
        break;
      }
    }

    if (!projectiles.includes(p)) continue;

    if (boss) {
      const br = rect(boss.x - boss.w / 2, boss.y - boss.h, boss.w, boss.h);
      if (collide(pr, br)) {
        boss.hp -= p.damage;
        spawnSparksAt(p.x, p.y);
        projectiles.splice(projectiles.indexOf(p), 1);

        if (boss.hp <= 0) {
          victory = true;
          gameState = "victory";
        }
        continue;
      }
    }

    if (levelFourBoss) {
      const br = rect(levelFourBoss.x - levelFourBoss.w / 2, levelFourBoss.y - levelFourBoss.h, levelFourBoss.w, levelFourBoss.h);
      if (collide(pr, br)) {
        levelFourBoss.hp -= p.damage;
        spawnSparksAt(p.x, p.y);
        projectiles.splice(projectiles.indexOf(p), 1);

        if (levelFourBoss.hp <= 0) {
          levelFourBoss = null;
          advanceLevel();
        }
      }
    }
  }
}

function spawnSparksAt(x, y) {
  for (let i = 0; i < 8; i++) {
    sparks.push({
      x,
      y,
      vx: rand(-3, 3),
      vy: rand(-5, -1),
      life: randint(10, 18),
      size: randint(2, 4),
      color: choice([C.FIRE1, C.FIRE2, C.FIRE3])
    });
  }
}

function drawPlayer(x, y) {
  const bodyBob = Math.sin(walkTimer) * 3;
  const duckOffset = isDucking ? 25 : 0;
  const dir = playerFacing;

  ctx.save();
  ctx.translate(x + 70, y + bodyBob + duckOffset);
  ctx.scale(dir, 1);

  drawCircle(C.SKIN, 0, -80, 22);
  drawEllipse(C.BLOND, -20, -102, 40, 22);

  drawRect(C.VEST, -24, -58, 48, isDucking ? 50 : 75);
  drawRect(C.PANTS, -20, isDucking ? -8 : 18, 16, 54);
  drawRect(C.PANTS, 4, isDucking ? -8 : 18, 16, 54);
  drawRect(C.BOOTS, -25, 70, 24, 10);
  drawRect(C.BOOTS, 4, 70, 24, 10);

  drawRect(C.SKIN, 20, -48, 42, 12);
  drawRect(C.SKIN, -62, -48, 42, 12);

  drawWeaponSprite(currentWeapon, 25, -44);

  if (now() < muzzleFlashEnd) {
    drawCircle(C.FIRE2, 70, -33, 14);
    drawCircle(C.FIRE1, 78, -33, 7);
  }

  ctx.restore();

  if (now() <= playerIframeUntil && Math.floor(now() / 80) % 2 === 0) {
    drawCircle([255, 255, 255], x + 70, y - 20, 65, 0.18);
  }
}

function drawWeaponSprite(w, x, y) {
  if (w === 1) {
    drawCircle(C.SKIN, x + 42, y + 10, 10);
  } else if (w === 2) {
    drawRect(C.GUN, x, y, 70, 11);
    drawRect(C.GUN_METAL, x + 50, y - 4, 22, 5);
    drawRect(C.GUN, x + 18, y + 10, 10, 28);
  } else if (w === 3) {
    drawRect(C.GUN, x, y, 80, 13);
    drawRect(C.WOOD || [120, 80, 35], x + 8, y + 12, 35, 9);
  } else if (w === 4) {
    drawRect(C.GUN, x, y, 42, 10);
    drawRect(C.GUN, x + 10, y + 10, 10, 20);
  } else if (w === 5) {
    drawLine([210, 220, 230], x, y, x + 68, y - 18, 8);
    drawLine([255, 255, 255], x + 5, y - 3, x + 65, y - 19, 2);
  } else if (w === 6) {
    drawRect([70, 90, 65], x - 6, y - 4, 88, 22);
    drawCircle([45, 60, 45], x + 84, y + 7, 12);
  }
}

function drawEnemy(e, shakeX = 0, shakeY = 0) {
  const sx = worldToScreenX(e.worldX) + shakeX;
  const y = e.y + shakeY;
  const bob = Math.sin(e.stride) * 2;
  const heavy = e.weapon === "heavy_machine";
  const flame = e.weapon === "flame";

  ctx.save();
  ctx.translate(sx, y + bob);
  ctx.scale(e.facing, 1);

  drawCircle(C.ENEMY_MASK, 0, -92, heavy ? 24 : 20);
  drawRect(heavy ? [65, 75, 65] : C.ENEMY_UNIFORM, -24, -70, heavy ? 55 : 48, heavy ? 86 : 76);
  drawRect([45, 55, 45], -20, 15, 14, 60);
  drawRect([45, 55, 45], 8, 15, 14, 60);
  drawRect(C.BLACK, -24, 72, 22, 10);
  drawRect(C.BLACK, 6, 72, 22, 10);

  if (e.weapon === "machete") {
    drawLine([210, 220, 230], 20, -48, 75, -70, 6);
  } else if (flame) {
    drawRect([70, 50, 30], 20, -50, 72, 16);
    drawCircle(C.FIRE3, 92, -42, 12);
    drawCircle(C.FIRE1, 100, -42, 5);
  } else {
    drawRect(C.ENEMY_GUN, 18, -52, heavy ? 90 : 65, heavy ? 16 : 10);
    drawRect(C.ENEMY_GUN, 35, -38, 12, 25);

    if (now() < e.muzzleFlashUntil) {
      drawCircle(C.FIRE2, heavy ? 112 : 88, -44, heavy ? 15 : 10);
      drawCircle(C.FIRE1, heavy ? 120 : 94, -44, 5);
    }
  }

  ctx.restore();

  const hpW = 58;
  drawRect(C.BLACK, sx - hpW / 2, y - e.h - 22, hpW, 8);
  drawRect(C.RED, sx - hpW / 2, y - e.h - 22, hpW, 8);
  drawRect(C.GREEN, sx - hpW / 2, y - e.h - 22, hpW * (e.hp / e.maxHp), 8);

  if (now() < e.talkUntil) {
    drawRounded(C.BLACK, sx - 65, y - e.h - 62, 130, 26, 8, 0.75);
    text(e.talkText, sx, y - e.h - 57, 14, C.WHITE, "center");
  }
}

function drawBoss(shakeX = 0, shakeY = 0) {
  if (!boss) return;

  const x = boss.x + shakeX;
  const y = boss.y + shakeY;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(boss.facing, 1);

  drawCircle(C.BOSS_HELMET, 0, -160, 38);
  drawRect(C.BOSS_ARMOR, -55, -125, 110, 130);
  drawRect([100, 45, 45], -42, -112, 84, 40);
  drawRect([50, 50, 60], -44, 8, 32, 78);
  drawRect([50, 50, 60], 12, 8, 32, 78);
  drawRect(C.BLACK, -50, 84, 42, 14);
  drawRect(C.BLACK, 8, 84, 42, 14);

  drawRect(C.ENEMY_GUN, -120, -105, 110, 18);
  drawCircle(C.FIRE3, -130, -96, now() - boss.lastAttack < 90 ? 18 : 0);

  ctx.restore();

  drawRect(C.BLACK, WIDTH / 2 - 300, 75, 600, 22);
  drawRect(C.RED, WIDTH / 2 - 300, 75, 600, 22);
  drawRect(C.GREEN, WIDTH / 2 - 300, 75, 600 * (boss.hp / boss.maxHp), 22);
  text("FINAL BOSS", WIDTH / 2, 42, 28, C.YELLOW, "center", "bold");
}

function drawLevelFourBoss(shakeX = 0, shakeY = 0) {
  if (!levelFourBoss) return;

  const b = levelFourBoss;
  const x = b.x + shakeX;
  const y = b.y + shakeY;

  ctx.save();
  ctx.translate(x, y);

  drawCircle([116, 178, 88], 0, -185, 48);
  drawRect([80, 120, 80], -70, -150, 140, 150);

  drawRect([60, 70, 65], -55, 5, 42, 92);
  drawRect([60, 70, 65], 13, 5, 42, 92);
  drawRect(C.BLACK, -62, 92, 52, 18);
  drawRect(C.BLACK, 8, 92, 52, 18);
  drawRect([40, 45, 40], -145, -110, 125, 24);

  ctx.restore();

  drawRect(C.BLACK, WIDTH / 2 - 320, 75, 640, 22);

  text("LEVEL 4 BRUTE", WIDTH / 2, 42, 28, C.YELLOW, "center", "bold");
}

function drawProjectiles(shakeX = 0, shakeY = 0) {
  for (const p of projectiles) {
    const px = p.x + shakeX;
    const py = p.y + shakeY;
    const tailX = px - p.vx * 0.8;
    const tailY = py - p.vy * 0.8;

    if (p.kind === "mg") {
      drawLine([255, 240, 160], tailX, tailY, px, py, 3);
    } else if (p.kind === "pistol") {
      drawLine(C.WHITE, tailX, tailY, px, py, 4);
    } else if (p.kind === "shotgun") {
      drawLine(C.FIRE2, tailX, tailY, px, py, 2);
    } else if (p.kind === "rocket") {
      const facing = p.vx >= 0 ? 1 : -1;
      drawEllipse([220, 130, 40], px - 12, py - 6, 24, 12);

      ctx.fillStyle = rgb(C.FIRE2);
      ctx.beginPath();
      ctx.moveTo(px + 12 * facing, py);
      ctx.lineTo(px - 8 * facing, py - 6);
      ctx.lineTo(px - 8 * facing, py + 6);
      ctx.closePath();
      ctx.fill();

      drawCircle(C.FIRE3, px - 14 * facing, py, 7);
      drawCircle(C.FIRE1, px - 18 * facing, py, 4);
    }
  }
}

function drawEnemyBullets(shakeX = 0, shakeY = 0) {
  for (const b of enemyBullets) {
    const bx = b.x + shakeX;
    const by = b.y + shakeY;

    if (b.kind === "fireball") {
      drawCircle(C.FIRE3, bx, by, 14);
      drawCircle(C.FIRE2, bx, by, 9);
      drawCircle(C.FIRE1, bx, by, 4);
      drawCircle(C.DARK_SMOKE, bx - 8, by - 4, 5);
      continue;
    }

    if (b.kind === "flame") {
      drawCircle(C.FIRE3, bx, by, 7);
      drawCircle(C.FIRE2, bx + 3, by, 5);
      drawCircle(C.FIRE1, bx + 6, by - 1, 3);
      continue;
    }

    const tailX = bx - b.vx * 1.4;
    const tailY = by - b.vy * 1.4;

    if (b.kind === "heavy_machine") {
      drawLine([255, 205, 120], tailX, tailY, bx, by, 6);
      drawCircle([255, 246, 190], bx, by, 4);
    } else if (b.kind === "machine") {
      drawLine([220, 170, 90], tailX, tailY, bx, by, 5);
      drawCircle([255, 240, 180], bx, by, 3);
    } else {
      drawLine([205, 140, 100], tailX, tailY, bx, by, 4);
      drawCircle([255, 232, 210], bx, by, 3);
    }
  }
}

function drawExplosions(shakeX = 0, shakeY = 0) {
  for (const e of explosions) {
    const p = 1 - e.life / e.maxLife;
    const scale = e.visualScale || 1;
    const x = e.x + shakeX;
    const y = e.y + shakeY;

    drawCircle([40, 40, 45], x, y, (18 + p * 78) * scale, 0.35);
    drawCircle(C.FIRE4, x, y, (18 + p * 62) * scale, 0.7);
    drawCircle(C.FIRE3, x, y, (12 + p * 42) * scale, 0.85);
    drawCircle(C.FIRE1, x, y, (7 + p * 24) * scale, 1);

    drawCircle(C.FIRE2, x - 18 * scale, y - 10 * scale, (10 + p * 18) * scale);
    drawCircle(C.FIRE3, x + 20 * scale, y - 8 * scale, (12 + p * 20) * scale);
    drawCircle(C.FIRE1, x + 18 * scale, y + 14 * scale, (9 + p * 16) * scale);
  }
}

function drawSmoke(shakeX = 0, shakeY = 0) {
  for (const s of smokeParticles) {
    const color = s.dark ? C.DARK_SMOKE : C.SMOKE;
    const alpha = clamp(s.life * 0.025, 0.1, 0.7);
    drawCircle(color, s.x + shakeX, s.y + shakeY, s.r, alpha);
  }
}

function drawShells(shakeX = 0, shakeY = 0) {
  for (const s of shells) {
    ctx.save();
    ctx.translate(s.x + shakeX, s.y + shakeY);
    ctx.rotate(s.rot * Math.PI / 180);
    drawRounded(C.BRASS, -6, -3, 10, 4, 2);
    drawRect(C.BLACK, 3, -3, 2, 4);
    ctx.restore();
  }
}

function drawSparks(shakeX = 0, shakeY = 0) {
  for (const sp of sparks) {
    drawLine(
      sp.color,
      sp.x + shakeX,
      sp.y + shakeY,
      sp.x - sp.vx * 1.4 + shakeX,
      sp.y - sp.vy * 1.4 + shakeY,
      sp.size
    );
  }
}

function drawShockwaves(shakeX = 0, shakeY = 0) {
  for (const sw of shockwaves) {
    ctx.strokeStyle = `rgba(255,230,170,${sw.life / sw.maxLife})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(sw.x + shakeX, sw.y + shakeY, sw.r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawSlashes(shakeX = 0, shakeY = 0) {
  for (const s of slashEffects) {
    ctx.strokeStyle = `rgba(255,255,255,${0.2 + s.life * 0.07})`;
    ctx.lineWidth = s.kind === "machete" ? 8 : 5;
    ctx.beginPath();
    ctx.arc(s.x + shakeX, s.y + shakeY, s.kind === "machete" ? 58 : 40, 5.1, 0.75);
    ctx.stroke();
  }
}

function drawShield(shakeX = 0, shakeY = 0) {
  if (!shieldActive) return;

  const sx = playerX + (playerFacing > 0 ? 122 : 18) + shakeX;
  const sy = getDrawY() + (isDucking ? 112 : 96) + shakeY;

  ctx.strokeStyle = "rgba(80,170,255,0.9)";
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.arc(sx, sy, shieldRadius, -Math.PI / 2, Math.PI / 2, playerFacing < 0);
  ctx.stroke();

  drawCircle([80, 170, 255], sx, sy, 8, 0.45);
}

function drawHud() {
  drawRounded([0, 0, 0], 12, 12, 600, 112, 12, 0.55);

  text("Level " + currentLevel, 28, 24, 24, C.YELLOW, "left", "bold");

  text("Health", 28, 58, 16);
  for (let i = 0; i < playerMaxHealth; i++) {
    drawRect(i < playerHealth ? C.RED : [65, 65, 65], 95 + i * 32, 58, 24, 18);
  }

  text("Weapon: " + weaponNames[currentWeapon], 28, 88, 18);

  if (currentWeapon === 2) {
    text(mgReloading ? "Reloading..." : "Ammo: " + mgAmmo + "/" + mgMagSize, 250, 88, 18, C.YELLOW);
  }

  if (currentWeapon === 6) {
    const cd = Math.max(0, grenadeReadyTime - now());
    text(cd > 0 ? "Bazooka: " + Math.ceil(cd / 1000) + "s" : "Bazooka ready", 250, 88, 18, C.YELLOW);
  }

  text("Bandages: " + bandages, 430, 88, 18, C.YELLOW);

  const shieldPct = shieldTimeLeft / shieldTimeMax;
  drawRect(C.BLACK, 28, 128, 220, 12);
  drawRect([80, 170, 255], 28, 128, 220 * shieldPct, 12);
  text("Shield", 258, 122, 15);

  let objective = "Enemies defeated: " + enemiesDefeated;

  if (currentLevel === 2) objective = `Level 2 kills: ${levelTwoKills}/${levelTwoSpawnTarget}`;
  if (currentLevel === 3) objective = `Level 3 kills: ${levelThreeKills}/${levelThreeSpawnTarget}`;
  if (currentLevel === 4) objective = "Objective: Kill the brute";
  if (currentLevel === 5 && !bossMode) objective = `Level 5 kills: ${levelFiveKills}/${levelFiveSpawnTarget}`;
  if (bossMode) objective = "Objective: Defeat final boss";

  text(objective, WIDTH / 2, 18, 22, C.YELLOW, "center", "bold");

  if (now() < statusUntil) {
    drawRounded(C.BLACK, WIDTH / 2 - 260, 55, 520, 38, 10, 0.6);
    text(statusText, WIDTH / 2, 62, 18, C.WHITE, "center");
  }

  drawButton(rect(WIDTH - 250, 12, 110, 38), "Pause", [60, 70, 100]);
  drawButton(rect(WIDTH - 130, 12, 110, 38), "Home", [90, 60, 60]);
}

function drawButton(r, label, color) {
  drawRounded(color, r.x, r.y, r.w, r.h, 12, 0.9);
  drawRoundedStroke([255, 255, 255], r.x, r.y, r.w, r.h, 12, 2, 0.25);
  text(label, r.x + r.w / 2, r.y + r.h / 2 - 12, 22, C.WHITE, "center", "bold");
}

function drawLevelSelectButtons() {
  for (let i = 0; i < levelSelectButtonRects.length; i++) {
    const r = levelSelectButtonRects[i];
    const lev = i + 1;
    const selected = lev === selectedStartLevel;

    drawButton(r, selected ? "Start L" + lev : "Level " + lev, selected ? [180, 130, 35] : [40, 105, 62]);

    if (selected) {
      drawRoundedStroke(C.YELLOW, r.x, r.y, r.w, r.h, 12, 3);
    }
  }
}

function drawHomeScreen() {
  drawDarkIslandBackground(worldOffset * 0.2);
  drawRain();
  drawRect([0, 0, 0], 0, 0, WIDTH, HEIGHT, 0.49);

  text("Island Commando Boss Hunt", WIDTH / 2, 68, 56, C.WHITE, "center", "bold");
  text("Choose a level on the left. Start or quit on the right.", WIDTH / 2, 132, 24, C.YELLOW, "center");

  const controls = rect(70, 176, WIDTH - 140, 112);
  drawRounded([10, 10, 10], controls.x, controls.y, controls.w, controls.h, 14, 0.95);
  drawRoundedStroke([100, 130, 165], controls.x, controls.y, controls.w, controls.h, 14, 2);

  text("How to Play", controls.x + controls.w / 2, controls.y + 12, 24, C.YELLOW, "center", "bold");
  text("A / D move    W jump    S duck    UP shield    P pause", controls.x + controls.w / 2, controls.y + 44, 18, C.WHITE, "center");
  text("Hold SPACE or click to attack    1-6 switch weapons    9 use bandage", controls.x + controls.w / 2, controls.y + 70, 18, C.WHITE, "center");
  text("Press L to unlock all weapons.", controls.x + controls.w / 2, controls.y + 94, 15, C.WHITE, "center");

  const left = rect(70, 330, 420, 430);
  const mid = rect(530, 330, WIDTH - 1060, 320);
  const right = rect(WIDTH - 470, 330, 400, 320);

  for (const box of [left, mid, right]) {
    drawRounded([8, 8, 8], box.x, box.y, box.w, box.h, 14, 0.65);
    drawRoundedStroke([90, 140, 205], box.x, box.y, box.w, box.h, 14, 2);
  }

  text("LEVEL SELECT", left.x + left.w / 2, left.y + 16, 24, C.YELLOW, "center", "bold");
  text("Highest level unlocked: " + maxLevelUnlocked, left.x + 28, left.y + 58, 18);
  text("Selected start level: " + selectedStartLevel, left.x + 28, left.y + 88, 18, C.YELLOW);
  text("Any level can be chosen here.", left.x + 28, left.y + 114, 15);
  drawLevelSelectButtons();

  text("MISSION", mid.x + mid.w / 2, mid.y + 16, 24, C.YELLOW, "center", "bold");
  const story = "You receive an emergency transmission: enemy forces hold the island, the city, and the tower. Fight through every level, survive the bosses, and take the world back.";
  const lines = wrapText(story, 18, mid.w - 44);
  for (let i = 0; i < lines.length; i++) {
    text(lines[i], mid.x + 22, mid.y + 62 + i * 26, 18);
  }

  text("START MENU", right.x + right.w / 2, right.y + 16, 24, C.YELLOW, "center", "bold");
  text("Pick a level, then press Start.", right.x + right.w / 2, right.y + 66, 18, C.WHITE, "center");
  text("Mouse: click level   Keyboard: 1-5 choose, Enter starts", right.x + right.w / 2, right.y + 92, 15, C.WHITE, "center");

  drawButton(startButtonRect, "Start Level " + selectedStartLevel, C.GREEN);
  drawButton(quitButtonRect, "Quit", C.RED);
}

function drawGameOver() {
  drawRect([0, 0, 0], 0, 0, WIDTH, HEIGHT, 0.68);
  text("YOU DIED", WIDTH / 2, 330, 56, C.WHITE, "center", "bold");
  text("Use movement, shield, bandages, and weapon switching to survive.", WIDTH / 2, 405, 24, C.YELLOW, "center");
  drawButton(resetButtonRect, "Try Again", C.GREEN);
  drawButton(homeButtonRect, "Home", [70, 80, 120]);
}

function drawPaused() {
  drawRect([0, 0, 0], 0, 0, WIDTH, HEIGHT, 0.6);
  text("PAUSED", WIDTH / 2, 310, 56, C.WHITE, "center", "bold");
  drawButton(resumeButtonRect, "Resume", [38, 84, 130]);
  drawButton(homeButtonRect, "Home", [70, 80, 120]);
}

function drawVictory() {
  drawRect([0, 0, 0], 0, 0, WIDTH, HEIGHT, 0.62);
  text("VICTORY", WIDTH / 2, 312, 56, C.YELLOW, "center", "bold");
  text("You cleared the island and took back Manhattan.", WIDTH / 2, 390, 26, C.WHITE, "center");
  drawButton(playAgainButtonRect, "Play Again", C.GREEN);
  drawButton(homeButtonRect, "Home", [70, 80, 120]);
}

function drawIntroBanner() {
  if (now() >= introPromptUntil) return;

  const lines = wrapText(introPromptText, 24, 940);
  const h = 54 + lines.length * 34;
  const x = WIDTH / 2 - 510;
  const y = 82;

  drawRounded([0, 0, 0], x, y, 1020, h, 12, 0.63);
  drawRoundedStroke([170, 140, 70], x, y, 1020, h, 12, 2);

  for (let i = 0; i < lines.length; i++) {
    text(lines[i], WIDTH / 2, y + 20 + i * 32, 24, C.YELLOW, "center");
  }
}

function drawPlaying() {
  const shakeX = cameraShake > 0 ? randint(-Math.floor(cameraShake), Math.floor(cameraShake)) : 0;
  const shakeY = cameraShake > 0 ? randint(-Math.floor(cameraShake), Math.floor(cameraShake)) : 0;

  if (bossMode) drawBossArena();
  else if (currentLevel === 2) drawLevelTwoBackground(worldOffset);
  else if (currentLevel === 3 || currentLevel === 4 || currentLevel === 5) drawLevelThreeBackground(worldOffset);
  else drawDarkIslandBackground(worldOffset);

  drawRain();

  drawShockwaves(shakeX, shakeY);
  drawSmoke(shakeX, shakeY);
  drawSparks(shakeX, shakeY);
  drawProjectiles(shakeX, shakeY);
  drawEnemyBullets(shakeX, shakeY);
  drawExplosions(shakeX, shakeY);
  drawShells(shakeX, shakeY);
  drawSlashes(shakeX, shakeY);

  for (const e of enemies) {
    const r = getEnemyRect(e);
    if (r.x > -100 && r.x < WIDTH + 100) {
      drawEnemy(e, shakeX, shakeY);
    }
  }

  if (bossMode && boss && !victory) drawBoss(shakeX, shakeY);
  if (currentLevel === 4 && levelFourBoss && !victory) drawLevelFourBoss(shakeX, shakeY);

  drawPlayer(playerX + shakeX, getDrawY() + shakeY);
  drawShield(shakeX, shakeY);
  drawHud();
  drawIntroBanner();

  if (gameOver) drawGameOver();
  else if (victory) drawVictory();
  else if (gameState === "paused") drawPaused();
}

function updateGame() {
  if (gameState !== "playing" || gameOver || victory) {
    updateRain();
    return;
  }

  updatePlayer();
  updateWeapons();
  updateEnemySpawn();
  updateEnemies();
  updateBoss();
  updateLevelFourBoss();
  updateProjectiles();
  updateEnemyBullets();
  checkPlayerAttacksHit();
  updateEffects();
  updateRain();

  if (currentLevel === 1 && enemiesDefeated >= 16 && enemies.length === 0) {
    advanceLevel();
  }
}

function drawGame() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  if (gameState === "menu") {
    drawHomeScreen();
  } else {
    drawPlaying();
  }
}

function loop() {
  updateGame();
  drawGame();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
